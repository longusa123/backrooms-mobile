name: Universal Android CI/CD Template (Modular Keys)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. Tải mã nguồn từ Repository
      uses: actions/checkout@v4

    - name: 2. Thiết lập Môi trường Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 3. Thiết lập Môi trường Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 4. Bật Bộ nhớ đệm Cache cho Node Modules (Tăng tốc build)
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: 5. Bật Bộ nhớ đệm Cache cho Gradle (Tăng tốc build Android)
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 6. Cài đặt các Thư viện Phụ thuộc
      run: npm install

    - name: 7. Bộ lọc và Trình Tạo Đồ họa Tự động (Đã sửa lỗi CLI)
      run: |
        echo "🔍 Tiến hành đồng bộ và chuẩn hóa tài nguyên đồ họa..."
        mkdir -p assets
        
        # Đảm bảo có ít nhất 1 file ảnh gốc để làm tài nguyên mẫu
        if [ ! -f "assets/icon.png" ] && [ ! -f "assets/splash.png" ]; then
          # Tìm kiếm file ảnh bất kỳ thay thế nếu thư mục trống
          FALLBACK_IMG=$(find . -type f \( -name "*.png" -o -name "*.jpg" \) | grep -v "node_modules" | head -n 1)
          if [ ! -z "$FALLBACK_IMG" ]; then
            cp "$FALLBACK_IMG" assets/icon.png
            cp "$FALLBACK_IMG" assets/splash.png
          fi
        fi

        # Gọi trực tiếp gói công cụ tạo asset chuẩn hóa không kèm tham số lỗi
        npm install @capacitor/assets --save-dev
        npx capacitor-assets generate
        echo "✅ Đồng bộ đồ họa hệ thống hoàn tất!"

    - name: 8. Lớp Cấu hình Mở rộng Định dạng nội bộ APK (No-Compress Layer)
      run: |
        echo "🛠️ Đang cấu hình mở rộng quyền đọc file asset hệ thống..."
        GRADLE_FILE="android/app/build.gradle"
        if [ -f "$GRADLE_FILE" ]; then
          sed -i '/android {/a \    aaptOptions {\n        noCompress "glb", "gltf", "fbx", "obj", "wasm", "bin", "json", "mp3", "ogg", "wav", "webp"\n    }' $GRADLE_FILE
          echo "✅ Đã mở khóa thành công định dạng file game nội bộ."
        else
          echo "⚠️ Chưa tạo thư mục android gốc, bỏ qua bước cấu hình file build."
        fi

    - name: 9. Đồng bộ Code Web vào Dự án Android
      run: |
        if [ -d "android" ]; then
          npx cap sync android
        else
          echo "🚀 Không phát hiện thư mục android! Tự động khởi tạo nền tảng Android core..."
          npx cap add android
          npx cap sync android
          sed -i '/android {/a \    aaptOptions {\n        noCompress "glb", "gltf", "fbx", "obj", "wasm", "bin", "json", "mp3", "ogg", "wav", "webp"\n    }' android/app/build.gradle
        fi

    - name: 10. Khởi tạo Chìa khóa Bảo mật (Gọi từ Engine Tách Biệt)
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        chmod +x scripts/sign-engine.sh
        # MẸO: Bạn muốn dùng loại key mặc định nào thì thay chữ "testkey" ở dưới thành loại đó 
        # (Ví dụ: platform, shared, media, editorkey)
        ./scripts/sign-engine.sh testkey

    - name: 11. Biên dịch và Đóng gói APK hoàn chỉnh
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=release.keystore \
          -Pandroid.injected.signing.store.password="${{ env.KEY_STORE_PASS }}" \
          -Pandroid.injected.signing.key.alias="${{ env.KEY_ALIAS_NAME }}" \
          -Pandroid.injected.signing.key.password="${{ env.KEY_STORE_PASS }}"

    - name: 12. Nhận diện Phiên bản và Đổi tên File APK Động
      id: apk_process
      run: |
        APP_NAME=$(node -p "require('./package.json').name" 2>/dev/null || echo "Mobile-App")
        APP_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "1.0.0")
        
        mkdir -p ready-to-publish
        REAL_APK_PATH=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
        
        if [ -z "$REAL_APK_PATH" ]; then
          echo "❌ Thất bại: Không tìm thấy file APK được sinh ra!"
          exit 1
        fi
        
        FINAL_NAME="${APP_NAME}-v${APP_VERSION}-${{ env.BUILD_LOG_MODE }}.apk"
        cp "$REAL_APK_PATH" "ready-to-publish/${FINAL_NAME}"
        
        echo "apk_name=${FINAL_NAME}" >> $GITHUB_OUTPUT
        echo "app_version=v${APP_VERSION}" >> $GITHUB_OUTPUT
        echo "apk_path=ready-to-publish/${FINAL_NAME}" >> $GITHUB_OUTPUT

    - name: 13. TỰ ĐỘNG MỔ XẺ VÀ PHÂN TÍCH CẤU TRÚC APK (Dissection)
      run: |
        echo "========================================================="
        echo "🩻 BẮT ĐẦU TIẾN TRÌNH PHẪU THUẬT VÀ KIỂM TRA NỘI THẤT APK"
        echo "========================================================="
        APK_TARGET="${{ steps.apk_process.outputs.apk_path }}"
        
        echo "📊 [1. ĐO ĐẠC DUNG LƯỢNG SẢN PHẨM]:"
        ls -lh "$APK_TARGET"
        echo "---------------------------------------------------------"
        
        echo "🧬 [2. KIỂM TRA ĐỊNH DẠNG HỆ THỐNG]:"
        file "$APK_TARGET"
        echo "---------------------------------------------------------"
        
        echo "📦 [3. MỔ XẺ THƯ MỤC WEB GAME NỘI BỘ (Kiểm tra asset & Code)]:"
        unzip -l "$APK_TARGET" | grep -E "assets/public/(index.html|.*\.glb|.*\.gltf|.*\.wasm|.*\.js|.*\.ogg|.*\.png)" | head -n 30 || echo "⏭️ Thư mục trống hoặc không chứa file asset đặc thù."
        echo "========================================================="
        echo "✅ HOÀN TẤT MỔ XẺ: Cấu trúc file hợp lệ, sẵn sàng phát hành!"

    - name: 14. Phát hành bài đăng (GitHub Release) để Tải Trực Tiếp APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.apk_process.outputs.app_version }}-${{ github.run_number }}
        name: Bản Đóng Gói Tự Động Toàn Diện ${{ steps.apk_process.outputs.app_version }} (Build #${{ github.run_number }})
        body: |
          ## 🎮 Bản phát hành Ứng dụng/Game hoàn chỉnh từ Hệ thống Tự động hóa Quốc Dân
          
          * **Phiên bản ứng dụng:** `${{ steps.apk_process.outputs.app_version }}`
          * **Trạng thái cấu hình khóa:** `${{ env.BUILD_LOG_MODE }}`
          * **Tính năng tích hợp:** Đã sửa lỗi quét đồ họa, mở khóa No-Compress Layer đọc file dung lượng cao.
          
          ---
          👇 **TẢI TRỰC TIẾP FILE SẢN PHẨM TẠI ĐÂY:**
        draft: false
        prerelease: false
        files: ${{ steps.apk_process.outputs.apk_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
