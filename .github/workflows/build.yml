name: Ultimate Android CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. Tải mã nguồn từ Repository
      uses: actions/checkout@v4

    - name: 2. Thiết lập Môi trường Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 3. Thiết lập Môi trường Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 4. Bật Bộ nhớ đệm Cache cho Node Modules (Tăng tốc build)
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: 5. Bật Bộ nhớ đệm Cache cho Gradle (Tăng tốc build Android)
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 6. Cài đặt các Thư viện Phụ thuộc
      run: npm install

    - name: 7. Bộ lọc Phân cấp Tài nguyên Đồ họa (Xử lý file đánh số bản sao)
      run: |
        echo "🔍 Hệ thống kích hoạt Bộ lọc Phân cấp Thuật toán..."
        mkdir -p assets
        HAS_PROCESSING=false

        # ==========================================
        # 🖼️ PHẦN 1: TỰ ĐỘNG ĐỊNH VỊ MÀN HÌNH CHÀO (SPLASH)
        # ==========================================
        if [ -f "assets/splash.png" ] || [ -f "assets/splash.jpg" ] || [ -f "assets/splash.jpeg" ]; then
          echo "✅ Đã có file Màn hình chào chuẩn cấu trúc."
          # Nếu là đuôi jpg/jpeg thì đổi về png cho đúng chuẩn Capacitor
          if [ ! -f "assets/splash.png" ]; then
            cp assets/splash.* assets/splash.png
          fi
          HAS_PROCESSING=true
        else
          # Truy lùng các file có tên chứa từ khóa nền (kể cả bản sao như bg1.png, background_copy.jpg)
          SPLASH_FALLBACK=$(find assets/ -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) | grep -E -i "splash|bg|background|screen" | head -n 1)
          if [ ! -z "$SPLASH_FALLBACK" ]; then
            echo "💡 Không có splash gốc, tự động ép file bản sao [$SPLASH_FALLBACK] làm Màn hình chào."
            cp "$SPLASH_FALLBACK" assets/splash.png
            HAS_PROCESSING=true
          fi
        fi

        # ==========================================
        # 📸 PHẦN 2: TỰ ĐỘNG ĐỊNH VỊ APP ICON (ƯU TIÊN FILE GỐC -> FILE ĐÁNH SỐ)
        # ==========================================
        if [ -f "assets/icon.png" ] || [ -f "assets/icon.jpg" ] || [ -f "assets/icon.jpeg" ]; then
          echo "✅ Đã định vị được App Icon gốc chuẩn chỉnh."
          if [ ! -f "assets/icon.png" ]; then
            cp assets/icon.* assets/icon.png
          fi
          HAS_PROCESSING=true
        else
          echo "⚠️ Không thấy icon.png gốc. Bắt đầu quét tìm các bản sao đánh số hoặc tên khác..."
          
          # Ưu tiên 1: Tìm các file chứa chữ 'icon' bị đánh số hoặc thêm chữ copy (Ví dụ: icon1.png, icon (1).jpg, icon_copy.png)
          ICON_FALLBACK=$(find assets/ -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) | grep -E -i "icon" | head -n 1)
          
          # Ưu tiên 2: Nếu không có chữ 'icon', tìm sang các file đặt tên kiểu: logo, texture, app, main
          if [ -z "$ICON_FALLBACK" ]; then
            ICON_FALLBACK=$(find assets/ -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) | grep -E -i "logo|texture|app|main" | head -n 1)
          fi
          
          # Ưu tiên 3: Bí quá thì hốt đại file ảnh đầu tiên trong thư mục (trừ file splash đã xử lý ở trên)
          if [ -z "$ICON_FALLBACK" ]; then
            ICON_FALLBACK=$(find assets/ -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \) | grep -v "splash" | head -n 1)
          fi

          if [ ! -z "$ICON_FALLBACK" ]; then
            echo "🎯 Thành công! Thuật toán đã chọn file [$ICON_FALLBACK] để đúc thành App Icon."
            cp "$ICON_FALLBACK" assets/icon.png
            HAS_PROCESSING=true
          fi
        fi

        # Kích hoạt dây chuyền cắt ảnh tự động nếu phát hiện tài nguyên hợp lệ
        if [ "$HAS_PROCESSING" = true ]; then
          echo "📦 Khởi động dây chuyền sản xuất asset Android..."
          npm install @capacitor/assets
          npx capacitor-assets generate --android
        else
          echo "⏭️ Thư mục trống hoàn toàn. Giữ nguyên bộ icon mặc định của hệ thống."
        fi

    - name: 8. Đồng bộ Code Web vào Dự án Android
      run: npx cap sync android

    - name: 9. Giải mã Chìa khóa Bí mật Keystore từ GitHub Secrets
      run: |
        if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "❌ Lỗi bảo mật: Bạn chưa cấu hình KEYSTORE_BASE64 trong mục Settings > Secrets!"
          exit 1
        fi
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

    - name: 10. Biên dịch và Ký số Bảo mật APK (Chống Play Protect chặn)
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=release.keystore \
          -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASSWORD }}"

    - name: 11. Nhận diện Phiên bản và Đổi tên File APK Động
      id: apk_process
      run: |
        APP_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "1.0.0")
        REAL_APK_PATH=$(find android/app/build/outputs/apk/release/ -name "*release*.apk" | head -n 1)
        
        if [ -z "$REAL_APK_PATH" ]; then
          echo "❌ Thất bại: Không tìm thấy file APK Release được sinh ra!"
          exit 1
        fi
        
        mkdir -p ready-to-publish
        FINAL_NAME="Backrooms-Mobile-v${APP_VERSION}-Signed.apk"
        cp "$REAL_APK_PATH" "ready-to-publish/${FINAL_NAME}"
        
        echo "apk_name=${FINAL_NAME}" >> $GITHUB_OUTPUT
        echo "app_version=v${APP_VERSION}" >> $GITHUB_OUTPUT
        echo "apk_path=ready-to-publish/${FINAL_NAME}" >> $GITHUB_OUTPUT

    - name: 12. Phát hành bài đăng (GitHub Release) để Tải Trực Tiếp APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.apk_process.outputs.app_version }}
        name: Backrooms Mobile Bản Đóng Gói Chỉnh Chu ${{ steps.apk_process.outputs.app_version }}
        body: |
          ## 🎮 Bản phát hành Game hoàn chỉnh từ hệ thống Tự động hóa
          
          * **Phiên bản hiện tại:** `${{ steps.apk_process.outputs.app_version }}`
          * **Chữ ký bảo mật:** Đã được ký bằng Keystore độc quyền (Vượt rào kiểm tra Google Play Protect).
          
          ---
          👇 **TẢI TRỰC TIẾP FILE SẢN PHẨM KHÔNG CẦN GIẢI NÉN TẠI ĐÂY:**
        draft: false
        prerelease: false
        files: ${{ steps.apk_process.outputs.apk_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
