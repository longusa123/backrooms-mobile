name: Ultimate Android CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. Tải mã nguồn từ Repository
      uses: actions/checkout@v4

    - name: 2. Thiết lập Môi trường Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 3. Thiết lập Môi trường Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 4. Bật Bộ nhớ đệm Cache cho Node Modules (Tăng tốc build)
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: 5. Bật Bộ nhớ đệm Cache cho Gradle (Tăng tốc build Android)
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 6. Cài đặt các Thư viện Phụ thuộc
      run: npm install

    - name: 7. Tự động nhận diện và Xử lý Đồ họa Thông minh
      run: |
        echo "🔍 Đang quét và kiểm tra tài nguyên hình ảnh..."
        mkdir -p assets
        
        # 🤖 CƠ CHẾ TỰ ĐỘNG NHẬN DIỆN ICON THAY THẾ
        HAS_IMAGE=false
        
        if [ -f "assets/icon.png" ]; then
          echo "✅ Đã tìm thấy file icon.png chuẩn."
          HAS_IMAGE=true
        elif [ -f "assets/texture.png" ]; then
          echo "💡 Không thấy icon.png nhưng phát hiện texture.png! Tự động chọn làm Icon game."
          cp assets/texture.png assets/icon.png
          HAS_IMAGE=true
        elif [ -f "assets/logo.png" ]; then
          echo "💡 Không thấy icon.png nhưng phát hiện logo.png! Tự động chọn làm Icon game."
          cp assets/logo.png assets/icon.png
          HAS_IMAGE=true
        fi

        # 🤖 CƠ CHẾ TỰ ĐỘNG NHẬN DIỆN SPLASH THAY THẾ
        if [ -f "assets/splash.png" ]; then
          echo "✅ Đã tìm thấy file splash.png chuẩn."
          HAS_IMAGE=true
        elif [ -f "assets/background.png" ]; then
          echo "💡 Không thấy splash.png nhưng phát hiện background.png! Tự động chọn làm Màn hình chào."
          cp assets/background.png assets/splash.png
          HAS_IMAGE=true
        fi

        # 🚀 TIẾN HÀNH XỬ LÝ NẾU CÓ ẢNH HỢP LỆ
        if [ "$HAS_IMAGE" = true ]; then
          echo "📦 Đang cài đặt công cụ xử lý đồ họa nâng cao..."
          npm install @capacitor/assets
          
          echo "📸 Đang tự động tối ưu hóa và xuất bản vẽ thiết kế ảnh..."
          # FIX: Loại bỏ hoàn toàn flag --icon / --splash lỗi, dùng lệnh chuẩn hóa hệ điều hành
          npx capacitor-assets generate --android
        else
          echo "⏭️ Không phát hiện bất kỳ file ảnh nào hợp lệ (icon, texture, logo, splash). Bỏ qua bước này và giữ icon mặc định."
        fi

    - name: 8. Đồng bộ Code Web vào Dự án Android
      run: npx cap sync android

    - name: 9. Giải mã Chìa khóa Bí mật Keystore từ GitHub Secrets
      run: |
        if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "❌ Lỗi bảo mật: Bạn chưa cấu hình KEYSTORE_BASE64 trong mục Settings > Secrets!"
          exit 1
        fi
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

    - name: 10. Biên dịch và Ký số Bảo mật APK (Chống Play Protect chặn)
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=release.keystore \
          -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASSWORD }}"

    - name: 11. Nhận diện Phiên bản và Đổi tên File APK Động
      id: apk_process
      run: |
        APP_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "1.0.0")
        REAL_APK_PATH=$(find android/app/build/outputs/apk/release/ -name "*release*.apk" | head -n 1)
        
        if [ -z "$REAL_APK_PATH" ]; then
          echo "❌ Thất bại: Không tìm thấy file APK Release được sinh ra!"
          exit 1
        fi
        
        mkdir -p ready-to-publish
        FINAL_NAME="Backrooms-Mobile-v${APP_VERSION}-Signed.apk"
        cp "$REAL_APK_PATH" "ready-to-publish/${FINAL_NAME}"
        
        echo "apk_name=${FINAL_NAME}" >> $GITHUB_OUTPUT
        echo "app_version=v${APP_VERSION}" >> $GITHUB_OUTPUT
        echo "apk_path=ready-to-publish/${FINAL_NAME}" >> $GITHUB_OUTPUT

    - name: 12. Phát hành bài đăng (GitHub Release) để Tải Trực Tiếp APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.apk_process.outputs.app_version }}
        name: Backrooms Mobile Bản Đóng Gói Chỉnh Chu ${{ steps.apk_process.outputs.app_version }}
        body: |
          ## 🎮 Bản phát hành Game hoàn chỉnh từ hệ thống Tự động hóa
          
          * **Phiên bản hiện tại:** `${{ steps.apk_process.outputs.app_version }}`
          * **Chữ ký bảo mật:** Đã được ký bằng Keystore độc quyền (Vượt rào kiểm tra Google Play Protect).
          
          ---
          👇 **TẢI TRỰC TIẾP FILE SẢN PHẨM KHÔNG CẦN GIẢI NÉN TẠI ĐÂY:**
        draft: false
        prerelease: false
        files: ${{ steps.apk_process.outputs.apk_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
